<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D3 Media Queries - Sandy Cadin</title>

    <link rel="stylesheet" href="./assets/css/style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="container">

        <!-- MENÚ -->

        <nav class="navbar">

            <div class="logo">
                <i class="fa-solid fa-car-side"></i>
                Electric Cars
            </div>

            <ul class="menu-desktop">
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Catálogo</a></li>
                <li><a href="#">Ofertas</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>

            <div class="menu-mobile">
                <i class="fa-solid fa-bars"></i>
            </div>

        </nav>

        <!-- FILTRO -->

        <section class="filters">

            <label for="cars">Ordenar por:</label>

            <select id="cars">
                <option>Precio</option>
                <option>Marca</option>
                <option>Modelo</option>
                <option>Año</option>
            </select>

        </section>

        <!-- PRODUCTOS -->

        <main class="products">

            <div class="card">
                <img src="https://images.unsplash.com/photo-1560958089-b8a1929cea89?w=600" alt="Tesla">
                <h3>Tesla Model 3</h3>
                <button>Ver más</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1553440569-bcc63803a83d?w=600" alt="BMW">
                <h3>BMW i4</h3>
                <button>Ver más</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?w=600" alt="Audi">
                <h3>Audi e-tron</h3>
                <button>Ver más</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=600" alt="Mercedes">
                <h3>Mercedes EQS</h3>
                <button>Ver más</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1502877338535-766e1452684a?w=600" alt="Volvo">
                <h3>Volvo EX30</h3>
                <button>Ver más</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1549399542-7e3f8b79c341?w=600" alt="Hyundai">
                <h3>Hyundai Ioniq 5</h3>
                <button>Ver más</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c?w=600" alt="Kia">
                <h3>Kia EV6</h3>
                <button>Ver más</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1502161254066-6c74afbf07aa?w=600" alt="Porsche">
                <h3>Porsche Taycan</h3>
                <button>Ver más</button>
            </div>

        </main>

        <!-- FOOTER -->

        <footer class="footer">

            <div class="social-icons">
                <i class="fa-brands fa-facebook-f"></i>
                <i class="fa-brands fa-instagram"></i>
            </div>

            <p>Electric Car Store © 2026 by Sandy</p>

        </footer>

    </div>

</body>

</html>
